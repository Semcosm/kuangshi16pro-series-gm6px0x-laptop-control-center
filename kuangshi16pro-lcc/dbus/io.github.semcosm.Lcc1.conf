<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="io.github.semcosm.Lcc1"/>
    <allow send_destination="io.github.semcosm.Lcc1"/>
  </policy>

  <policy context="default">
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Manager"
           send_member="GetCapabilities"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Manager"
           send_member="GetState"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Manager"
           send_member="SetMode"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Manager"
           send_member="SetProfile"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Fan"
           send_member="ApplyFanTable"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Fan"
           send_member="SetFanBoost"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="io.github.semcosm.Lcc1.Power"
           send_member="SetPowerLimits"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"/>
    <allow send_destination="io.github.semcosm.Lcc1"
           send_interface="org.freedesktop.DBus.Peer"
           send_member="Ping"/>
  </policy>
</busconfig>
